    <script>
        lucide.createIcons();
        const navbar = document.getElementById('navbar');
        const navLinks = navbar.querySelectorAll('.nav-link');
        const logoImg = navbar.querySelector('.nav-logo');
        const navBrandText = document.getElementById('nav-brand-text');
        
        // Transisi Navbar saat di-scroll
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('glass-nav');
                navbar.classList.remove('text-white', 'py-4');
                navbar.classList.add('text-gray-900', 'py-3');
                navLinks.forEach(el => el.classList.remove('drop-shadow-md', 'text-white'));
                logoImg.classList.remove('border-white/20');
                logoImg.classList.add('border-gray-200');
                navBrandText.classList.remove('hidden', 'sm:block', 'font-sans', 'text-xs', 'font-extrabold', 'tracking-[0.3em]');
                navBrandText.classList.add('font-cinzel', 'text-xl', 'font-bold', 'text-ocean-900', 'tracking-widest');
            } else {
                navbar.classList.remove('glass-nav', 'text-gray-900', 'py-3');
                navbar.classList.add('text-white', 'py-4');
                navLinks.forEach(el => { el.classList.add('drop-shadow-md'); });
                logoImg.classList.remove('border-gray-200');
                logoImg.classList.add('border-white/20');
                navBrandText.classList.add('hidden', 'sm:block', 'font-sans', 'text-xs', 'font-extrabold', 'tracking-[0.3em]');
                navBrandText.classList.remove('font-cinzel', 'text-xl', 'font-bold', 'text-ocean-900', 'tracking-widest');
            }
        });

        // Efek Muncul (Reveal)
        const revealElements = document.querySelectorAll('.reveal');
        const revealObserver = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => { if (entry.isIntersecting) { entry.target.classList.add('active'); observer.unobserve(entry.target); } });
        }, { root: null, threshold: 0.1, rootMargin: "0px 0px -50px 0px" });
        revealElements.forEach(el => revealObserver.observe(el));
    </script>
</body>
